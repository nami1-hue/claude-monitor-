<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Monitor</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #10b981;
            font-weight: 600;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .command-input-section {
            background: #f0f9ff;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .command-input-section h3 {
            margin: 0 0 15px 0;
            color: #1e40af;
            font-size: 18px;
        }

        .command-input-wrapper {
            display: flex;
            gap: 10px;
        }

        #commandInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }

        #commandInput:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-send {
            background: #3b82f6;
            color: white;
            padding: 12px 30px;
            min-width: 120px;
        }

        .btn-send:hover {
            background: #2563eb;
        }

        .hint {
            margin: 10px 0 0 0;
            font-size: 13px;
            color: #64748b;
        }

        .approval-banner {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .approval-banner.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .approval-banner h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .approval-content {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .approval-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-approve {
            background: #10b981;
            color: white;
        }

        .btn-reject {
            background: #ef4444;
            color: white;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        .message {
            background: #f9fafb;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.approval {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: #6b7280;
        }

        .message-content {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #1f2937;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .main-content {
                padding: 20px;
            }

            .approval-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Claude Code Monitor</h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Conectando...</span>
            </div>
        </div>

        <div class="main-content">
            <!-- Command Input -->
            <div class="command-input-section">
                <h3>🎯 Ejecutar comando de Claude Code</h3>
                <div class="command-input-wrapper">
                    <input
                        type="text"
                        id="commandInput"
                        placeholder='Ejemplo: cc ask "¿Cuál es la capital de Francia?"'
                        onkeypress="if(event.key==='Enter') sendCommand()"
                    />
                    <button class="btn btn-send" onclick="sendCommand()">Enviar</button>
                </div>
                <p class="hint">💡 Escribe cualquier comando de Claude Code y se ejecutará en tu WSL</p>
            </div>

            <div class="approval-banner" id="approvalBanner">
                <h3>⚠️ Acción requiere aprobación</h3>
                <div class="approval-content" id="approvalContent"></div>
                <div class="approval-buttons">
                    <button class="btn btn-approve" onclick="handleApproval('y')">✅ Aprobar</button>
                    <button class="btn btn-reject" onclick="handleApproval('n')">❌ Rechazar</button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <h3>Esperando comandos...</h3>
                    <p>Inicia el daemon: <code>cc-daemon</code></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let messages = [];

        socket.on('connect', () => {
            console.log('Connected to server');
            updateStatus('Conectado', true);
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            updateStatus('Desconectado', false);
        });

        socket.on('new_message', (msg) => {
            console.log('New message:', msg);
            addMessage(msg);
        });

        socket.on('approval_resolved', (data) => {
            console.log('Approval resolved:', data);
            hideApprovalBanner();
        });

        function updateStatus(text, connected) {
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');

            statusText.textContent = text;
            statusDot.style.background = connected ? '#10b981' : '#ef4444';
        }

        function addMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const emptyState = container.querySelector('.empty-state');

            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message' + (msg.is_approval ? ' approval' : '');
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span>${msg.type}</span>
                    <span>${msg.timestamp}</span>
                </div>
                <div class="message-content">${escapeHtml(msg.content)}</div>
            `;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;

            messages.push(msg);

            // Show approval banner if needed
            if (msg.is_approval) {
                showApprovalBanner(msg.content);
            }
        }

        function showApprovalBanner(content) {
            const banner = document.getElementById('approvalBanner');
            const contentDiv = document.getElementById('approvalContent');

            contentDiv.textContent = content;
            banner.classList.add('active');
        }

        function hideApprovalBanner() {
            const banner = document.getElementById('approvalBanner');
            banner.classList.remove('active');
        }

        async function handleApproval(response) {
            try {
                const res = await fetch('/api/approve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ response })
                });

                const data = await res.json();
                console.log('Approval sent:', data);

                hideApprovalBanner();
            } catch (error) {
                console.error('Error sending approval:', error);
                alert('Error al enviar respuesta');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendCommand() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim();

            if (!command) {
                alert('Por favor escribe un comando');
                return;
            }

            try {
                // Send command to server
                const res = await fetch('/api/send_command', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ command })
                });

                const data = await res.json();

                if (data.status === 'ok') {
                    // Clear input
                    input.value = '';

                    // Show feedback
                    addMessage({
                        type: 'web',
                        content: `📤 Comando enviado: ${command}`,
                        timestamp: new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit', second: '2-digit'}),
                        is_approval: false
                    });
                } else {
                    alert('Error al enviar comando: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error sending command:', error);
                alert('Error al enviar comando');
            }
        }

        // Load initial messages
        fetch('/api/messages')
            .then(res => res.json())
            .then(msgs => {
                msgs.forEach(msg => addMessage(msg));
            })
            .catch(err => console.error('Error loading messages:', err));
    </script>
</body>
</html>
